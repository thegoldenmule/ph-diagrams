<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 700px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    /* Shared box style */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-lg) var(--space-md);
      text-align: center;
    }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }
    .box.accent-green  { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }
    .box.accent-purple { border-color: var(--accent-purple); background: var(--accent-purple-bg); color: var(--accent-purple); }

    .box-title {
      font-size: 15px;
      font-weight: var(--font-weight-semibold);
    }
    .box-detail {
      font-size: 11px;
      opacity: 0.7;
      margin-top: var(--space-xs);
      line-height: var(--line-height-normal);
    }

    /* Both rows share the same column template so verticals align */
    .top-row, .return-path {
      display: grid;
      grid-template-columns: 1fr 100px 1.2fr 40px 1fr;
      column-gap: var(--space-md);
    }

    .top-row {
      align-items: center;
    }

    /* Horizontal connector arrow with label */
    .h-connector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .h-connector-label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
    }
    .h-connector-line {
      width: 100%;
      min-width: 36px;
      height: 3px;
      background: var(--text-primary);
      position: relative;
    }
    .h-connector-line::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--text-primary);
    }

    /* ── Return path: U-shape from Dispatch back to Reactor ── */
    .return-path {
      position: relative;
      margin-top: var(--space-md);
      height: 44px;
    }

    /* Left vertical riser (back up to Reactor) with upward arrow */
    .return-left {
      grid-column: 1;
      justify-self: center;
      width: 3px;
      height: 100%;
      background: var(--text-primary);
      position: relative;
    }
    .return-left::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 8px solid var(--text-primary);
    }

    /* Right vertical drop (down from Dispatch) */
    .return-right {
      grid-column: 5;
      justify-self: center;
      width: 3px;
      height: 100%;
      background: var(--text-primary);
    }

    /*
     * Horizontal dashed bar connecting the two verticals.
     * Inset = half of one 1fr column = (total_width - fixed) / 6.4
     * where fixed = 100px + 40px + 4 × 16px gaps = 204px
     */
    .return-path::after {
      content: '';
      position: absolute;
      bottom: 0;
      height: 3px;
      left: calc((100% - 204px) / 6.4);
      right: calc((100% - 204px) / 6.4);
      background: repeating-linear-gradient(
        to left,
        var(--text-primary) 0,
        var(--text-primary) 6px,
        transparent 6px,
        transparent 10px
      );
    }

    /* Label below the return bar */
    .return-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Async badge */
    .async-badge {
      font-size: 9px;
      font-weight: var(--font-weight-semibold);
      color: var(--accent-green);
      background: var(--accent-green-bg);
      border: 1px solid var(--accent-green);
      border-radius: var(--radius-xs);
      padding: 1px 6px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Processor Data Flow</h2>
      <p class="card-subtitle">One-way flow — operations in, mutations out</p>

      <div class="card-body">

        <!-- Row 1: Reactor → Processor → Dispatch -->
        <div class="top-row">
          <div class="box accent-green">
            <div class="box-title">Reactor</div>
            <div class="box-detail">operations arrive</div>
          </div>

          <div class="h-connector">
            <span class="h-connector-label">onOperations()</span>
            <div class="h-connector-line"></div>
          </div>

          <div class="box accent-blue">
            <div class="box-title">Processor</div>
            <div class="box-detail">process &amp; react</div>
          </div>

          <div class="h-connector">
            <div class="h-connector-line"></div>
          </div>

          <div class="box accent-purple">
            <div class="box-title">Dispatch</div>
            <div class="box-detail">submit mutations</div>
          </div>
        </div>

        <!-- Return path: Dispatch → Reactor (async) -->
        <div class="return-path">
          <div class="return-left"></div>
          <div class="return-right"></div>
        </div>

        <div class="return-label">
          <span>dispatch.execute()</span>
          <span class="async-badge">async</span>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
