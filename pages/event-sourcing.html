<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 700px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    /* Horizontal flow: 3 event columns + 2 connector columns */
    .h-flow {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: start;
      gap: var(--space-lg);
    }

    /* Shared box style */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 15px;
      font-weight: var(--font-weight-semibold);
      text-align: center;
    }
    .box.accent-cyan  { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-green { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }

    /* Stacked column: event → connector → state */
    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* State snapshot box — monospace text, left-aligned */
    .box.state-snapshot {
      font-family: var(--font-mono, 'SF Mono', 'Fira Code', 'Fira Mono', monospace);
      font-size: 12px;
      font-weight: var(--font-weight-medium);
      text-align: left;
      white-space: pre;
      line-height: 1.5;
      padding: var(--space-sm) var(--space-md);
      width: 100%;
    }

    /* Vertical dotted connector with downward arrow */
    .v-connector--dotted {
      width: 2px;
      height: 24px;
      border-left: 2px dashed var(--text-muted);
      position: relative;
      flex-shrink: 0;
    }
    .v-connector--dotted::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: -5px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid var(--text-muted);
    }

    /* Horizontal connector arrow — aligned to event row */
    .h-connector-wrap {
      display: flex;
      align-items: center;
      /* Align to the center of the top event box */
      margin-top: var(--space-md);
      height: calc(15px + 2 * var(--space-md));
    }
    .h-connector {
      width: 20px;
      height: 3px;
      background: var(--text-primary);
      position: relative;
      flex-shrink: 0;
    }
    .h-connector::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Event Sourcing</h2>
      <p class="card-subtitle">State as a stream of events</p>

      <div class="card-body">
        <div class="h-flow">

          <!-- Event 1: UserCreated -->
          <div class="stack">
            <div class="box accent-green">UserCreated</div>
            <div class="v-connector--dotted"></div>
            <div class="box accent-cyan state-snapshot">{ name: 'Alice' }</div>
          </div>

          <div class="h-connector-wrap">
            <div class="h-connector"></div>
          </div>

          <!-- Event 2: NameChanged -->
          <div class="stack">
            <div class="box accent-green">NameChanged</div>
            <div class="v-connector--dotted"></div>
            <div class="box accent-cyan state-snapshot">{ name: 'Bob' }</div>
          </div>

          <div class="h-connector-wrap">
            <div class="h-connector"></div>
          </div>

          <!-- Event 3: EmailSet -->
          <div class="stack">
            <div class="box accent-green">EmailSet</div>
            <div class="v-connector--dotted"></div>
            <div class="box accent-cyan state-snapshot">{ name: 'Bob',
  email:
  'bob@co.io' }</div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
