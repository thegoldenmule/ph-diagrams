<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame { max-width: 700px; }
    .card { height: auto; }
    .card-body { flex: none; }

    /* Box component */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      text-align: center;
    }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-purple { border-color: var(--accent-purple); background: var(--accent-purple-bg); color: var(--accent-purple); }
    .box.accent-green  { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }
    .box.accent-red    { border-color: #ef4444;  background: rgba(239, 68, 68, 0.12);  color: #ef4444; }

    .box-title {
      font-size: 14px;
      font-weight: var(--font-weight-semibold);
    }

    .box-note {
      font-size: 11px;
      font-weight: var(--font-weight-regular);
      opacity: 0.7;
      margin-top: 2px;
    }

    /* Vertical connector — downward arrow */
    .v-connector {
      width: 3px;
      height: 20px;
      background: var(--text-primary);
      margin: var(--space-sm) auto;
      position: relative;
    }
    .v-connector::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid var(--text-primary);
    }

    /* Blocked connector — dashed with X */
    .v-connector-blocked {
      width: 3px;
      height: 20px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(239, 68, 68, 0.6) 0px,
        rgba(239, 68, 68, 0.6) 4px,
        transparent 4px,
        transparent 8px
      );
      margin: var(--space-sm) auto;
      position: relative;
    }
    .v-connector-blocked::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid rgba(239, 68, 68, 0.6);
    }

    /* Two-column grid */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 var(--space-md);
      align-items: start;
      position: relative;
    }

    /* SVG arrow overlay */
    .arrow-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Side wrappers with dashed borders */
    .side-wrapper {
      border: 1px dashed var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      padding-top: var(--space-lg);
      position: relative;
    }
    .side-wrapper-label {
      position: absolute;
      top: -9px;
      left: var(--space-md);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--bg-surface);
      padding: 0 var(--space-sm);
      color: var(--text-muted);
    }

    /* Column flow */
    .col-flow {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Reducer Divergence</h2>
      <p class="card-subtitle">Non-commutative operations lead to divergence</p>

      <div class="card-body">
        <div class="two-col">

          <!-- SVG arrow overlay -->
          <svg class="arrow-overlay" id="arrowSvg">
            <defs>
              <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#F59E0B" />
              </marker>
            </defs>
          </svg>

          <!-- Client A -->
          <div class="side-wrapper">
            <span class="side-wrapper-label">Client A</span>
            <div class="col-flow">
              <div class="box accent-cyan">
                <div class="box-title">balance = 10</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-purple" data-arrow="a-w8">
                <div class="box-title">WITHDRAW(8)</div>
                <div class="box-note">10 &ge; 8 &check;</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-cyan">
                <div class="box-title">balance = 2</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-purple" data-arrow="a-w5">
                <div class="box-title">WITHDRAW(5)</div>
                <div class="box-note">2 &lt; 5 &cross;</div>
              </div>
              <div class="v-connector-blocked"></div>
              <div class="box accent-red">
                <div class="box-title">balance = 2</div>
              </div>
            </div>
          </div>

          <!-- Client B -->
          <div class="side-wrapper">
            <span class="side-wrapper-label">Client B</span>
            <div class="col-flow">
              <div class="box accent-cyan">
                <div class="box-title">balance = 10</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-purple" data-arrow="b-w5">
                <div class="box-title">WITHDRAW(5)</div>
                <div class="box-note">10 &ge; 5 &check;</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-cyan">
                <div class="box-title">balance = 5</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-purple" data-arrow="b-w8">
                <div class="box-title">WITHDRAW(8)</div>
                <div class="box-note">5 &lt; 8 &cross;</div>
              </div>
              <div class="v-connector-blocked"></div>
              <div class="box accent-red">
                <div class="box-title">balance = 5</div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>
  <script>
    function drawArrows() {
      const svg = document.getElementById('arrowSvg');
      const grid = svg.parentElement;
      const gridRect = grid.getBoundingClientRect();

      // Clear existing lines
      svg.querySelectorAll('line').forEach(l => l.remove());

      function boxEdge(attr, side) {
        const el = grid.querySelector(`[data-arrow="${attr}"]`);
        const r = el.getBoundingClientRect();
        return {
          x: (side === 'right' ? r.right : r.left) - gridRect.left,
          y: r.top + r.height / 2 - gridRect.top
        };
      }

      function addLine(from, to) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', from.x);
        line.setAttribute('y1', from.y);
        line.setAttribute('x2', to.x);
        line.setAttribute('y2', to.y);
        line.setAttribute('stroke', '#F59E0B');
        line.setAttribute('stroke-width', '2');
        line.setAttribute('stroke-dasharray', '6 4');
        line.setAttribute('marker-end', 'url(#arrowhead-orange)');
        svg.appendChild(line);
      }

      // A's WITHDRAW(8) → B's WITHDRAW(8) (same operation, different position)
      addLine(
        boxEdge('a-w8', 'right'),
        boxEdge('b-w8', 'left')
      );

      // B's WITHDRAW(5) → A's WITHDRAW(5)
      addLine(
        boxEdge('b-w5', 'left'),
        boxEdge('a-w5', 'right')
      );
    }

    drawArrows();
  </script>
</body>
</html>
