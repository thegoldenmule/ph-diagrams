<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame { max-width: 960px; }
    .card { height: auto; }
    .card-body { flex: none; }

    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-align: center;
      white-space: nowrap;
      width: 104px;
      height: 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-green  { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }

    .box .ts {
      font-size: 10px;
      font-weight: var(--font-weight-medium);
      opacity: 0.7;
      margin-top: 1px;
    }

    /* Stream row — horizontal chain of boxes */
    .stream-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .stream-label {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: var(--space-xs);
    }

    /* Horizontal arrow between boxes */
    .h-arrow {
      width: 12px;
      height: 2px;
      background: var(--text-muted);
      position: relative;
      flex-shrink: 0;
    }
    .h-arrow::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid var(--text-muted);
    }

    /* Vertical connector sections */
    .connector-down {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--space-sm) 0;
    }

    .v-arrow-down {
      width: 2px;
      height: 28px;
      background: var(--text-muted);
      position: relative;
    }
    .v-arrow-down::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid var(--text-muted);
    }

    .plus-sign {
      font-size: 20px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      line-height: 1;
    }

    .merge-label {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: center;
      margin: var(--space-xs) 0;
    }

  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">One-Way Sync</h2>
      <p class="card-subtitle">Reactor A receives operations from Reactor B and must merge them into a new stream A&prime;</p>

      <div class="card-body">

        <!-- Stream A (top) -->
        <div class="stream-label">Stream A</div>
        <div class="stream-row">
          <div class="box accent-cyan">A₁<span class="ts">t1</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-cyan">A₂<span class="ts">t3</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-cyan">A₃<span class="ts">t5</span></div>
        </div>

        <!-- Plus sign -->
        <div class="connector-down">
          <div class="plus-sign">+</div>
        </div>

        <!-- Stream B -->
        <div class="stream-label">Stream B</div>
        <div class="stream-row">
          <div class="box accent-green">B₁<span class="ts">t2</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-green">B₂<span class="ts">t4</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-green">B₃<span class="ts">t6</span></div>
        </div>

        <!-- Arrow down -->
        <div class="connector-down">
          <div class="v-arrow-down"></div>
        </div>

        <!-- Merged stream A′ (bottom) -->
        <div class="merge-label">A&prime; &mdash; merged stream</div>
        <div class="stream-row">
          <div class="box accent-cyan">A₁<span class="ts">t1</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-green">B₁<span class="ts">t2</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-cyan">A₂<span class="ts">t3</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-green">B₂<span class="ts">t4</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-cyan">A₃<span class="ts">t5</span></div>
          <div class="h-arrow"></div>
          <div class="box accent-green">B₃<span class="ts">t6</span></div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
