<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 700px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    /* Box styles */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-xs) var(--space-sm);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-align: center;
    }
    .box.accent-cyan  { border-color: var(--accent-cyan);  background: var(--accent-cyan-bg);  color: var(--accent-cyan); }
    .box.accent-green { border-color: var(--accent-green); background: var(--accent-green-bg); color: var(--accent-green); }

    /* Timestamp subscript */
    .ts {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: var(--font-weight-medium);
      display: block;
      margin-top: 1px;
    }

    /* Short hash */
    .hash {
      font-size: 8px;
      color: var(--text-muted);
      font-family: var(--font-mono, 'SF Mono', 'Fira Code', monospace);
      font-weight: var(--font-weight-medium);
      display: block;
      opacity: 0.7;
      margin-top: 1px;
    }

    /* Timeline grid */
    .timeline {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      grid-template-rows: auto auto;
      gap: var(--space-xs);
      position: relative;
    }

    /* Merge base indicator */
    .box.merge-base {
      position: relative;
    }
    .merge-base-label {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 28px;
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: #e8863a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .merge-base-arrow {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 22px;
      background: #e8863a;
      margin-bottom: 8px;
    }
    .merge-base-arrow::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: -4px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #e8863a;
    }

    /* Conflict dashed overlay */
    .conflict-overlay {
      grid-column: 3 / 12;
      grid-row: 1 / 3;
      border: 1px dashed rgba(232, 134, 58, 0.5);
      border-radius: var(--radius-md);
      pointer-events: none;
      margin: -6px;
      position: relative;
    }
    .conflict-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: #e8863a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.8;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="card-body" style="padding-top: 40px; padding-bottom: 32px;">

        <div class="timeline">
          <!-- Row 1: Stream A — cols 1,2,4,6,8,10 -->
          <div class="box accent-cyan" style="grid-column:1; grid-row:1;">A₁ <span class="ts">t=1</span><span class="hash">a3f1</span></div>
          <div class="box accent-cyan merge-base" style="grid-column:2; grid-row:1;">
            <div class="merge-base-label">Merge base</div>
            <div class="merge-base-arrow"></div>
            A₂ <span class="ts">t=5</span><span class="hash">b7d2</span>
          </div>
          <div class="box accent-cyan" style="grid-column:4; grid-row:1;">A₃ <span class="ts">t=12</span><span class="hash">e9c4</span></div>
          <div class="box accent-cyan" style="grid-column:6; grid-row:1;">A₄ <span class="ts">t=18</span><span class="hash">f2a8</span></div>
          <div class="box accent-cyan" style="grid-column:8; grid-row:1;">A₅ <span class="ts">t=27</span><span class="hash">c1d9</span></div>
          <div class="box accent-cyan" style="grid-column:10; grid-row:1;">A₆ <span class="ts">t=34</span><span class="hash">d4e2</span></div>

          <!-- Row 2: Stream B — cols 1,3,5,7,9,11 -->
          <div class="box accent-green" style="grid-column:1; grid-row:2;">B₁ <span class="ts">t=1</span><span class="hash">a3f1</span></div>
          <div class="box accent-green" style="grid-column:3; grid-row:2;">B₂ <span class="ts">t=8</span><span class="hash">d1b3</span></div>
          <div class="box accent-green" style="grid-column:5; grid-row:2;">B₃ <span class="ts">t=14</span><span class="hash">a8f5</span></div>
          <div class="box accent-green" style="grid-column:7; grid-row:2;">B₄ <span class="ts">t=21</span><span class="hash">e3d7</span></div>
          <div class="box accent-green" style="grid-column:9; grid-row:2;">B₅ <span class="ts">t=30</span><span class="hash">f7b1</span></div>
          <div class="box accent-green" style="grid-column:11; grid-row:2;">B₆ <span class="ts">t=39</span><span class="hash">a2e8</span></div>

          <!-- Conflict overlay spanning cols 3-11 -->
          <div class="conflict-overlay">
            <div class="conflict-label">Conflict</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
