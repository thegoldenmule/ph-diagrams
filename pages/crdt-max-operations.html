<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame { max-width: 700px; }
    .card { height: auto; }
    .card-body { flex: none; }

    /* Box component */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      text-align: center;
    }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }

    .box-title {
      font-size: 14px;
      font-weight: var(--font-weight-semibold);
    }

    /* Vertical connector — downward arrow */
    .v-connector {
      width: 3px;
      height: 20px;
      background: var(--text-primary);
      margin: var(--space-sm) auto;
      position: relative;
    }
    .v-connector::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid var(--text-primary);
    }

    /* Two-column grid */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-lg);
    }

    /* Side wrappers with dashed borders */
    .side-wrapper {
      border: 1px dashed var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      padding-top: var(--space-lg);
      position: relative;
    }
    .side-wrapper-label {
      position: absolute;
      top: -9px;
      left: var(--space-md);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--bg-surface);
      padding: 0 var(--space-sm);
      color: var(--text-muted);
    }

    /* Column flow */
    .col-flow {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">CRDT Max Operations</h2>
      <p class="card-subtitle">Two reactors with independent local operations</p>

      <div class="card-body">
        <div class="two-col">

          <!-- Client A -->
          <div class="side-wrapper">
            <span class="side-wrapper-label">Client A</span>
            <div class="col-flow">
              <div class="box accent-cyan">
                <div class="box-title">x = 0</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-blue">
                <div class="box-title">max(x, 5)</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-cyan">
                <div class="box-title">x = 5</div>
              </div>
            </div>
          </div>

          <!-- Client B -->
          <div class="side-wrapper">
            <span class="side-wrapper-label">Client B</span>
            <div class="col-flow">
              <div class="box accent-cyan">
                <div class="box-title">x = 0</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-blue">
                <div class="box-title">max(x, 6)</div>
              </div>
              <div class="v-connector"></div>
              <div class="box accent-cyan">
                <div class="box-title">x = 6</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
