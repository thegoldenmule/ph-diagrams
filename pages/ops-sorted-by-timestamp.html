<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 700px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    /* Box styles */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      text-align: center;
    }
    .box.accent-cyan  { border-color: var(--accent-cyan);  background: var(--accent-cyan-bg);  color: var(--accent-cyan); }
    .box.accent-green { border-color: var(--accent-green); background: var(--accent-green-bg); color: var(--accent-green); }

    .box-sm {
      padding: var(--space-sm) var(--space-md);
      font-size: 12px;
      font-weight: var(--font-weight-semibold);
    }

    /* Stream label */
    .stream-label {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: var(--space-sm);
    }

    /* Horizontal op stream */
    .op-row {
      display: flex;
      gap: var(--space-sm);
      justify-content: center;
      flex-wrap: wrap;
    }
    .op-row .box-sm {
      flex: 0 0 auto;
      min-width: 44px;
    }

    /* Vertical arrow connector */
    .v-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
      margin: var(--space-lg) 0;
    }
    .v-arrow-line {
      width: 2px;
      height: 32px;
      background: var(--text-muted);
      opacity: 0.4;
      position: relative;
    }
    .v-arrow-line::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: -4px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid var(--text-muted);
    }
    .v-arrow-label {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: var(--space-lg);
      justify-content: center;
      margin-bottom: var(--space-lg);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: var(--radius-xs);
      border: 1px solid;
    }
    .legend-swatch.swatch-cyan {
      background: var(--accent-cyan-bg);
      border-color: var(--accent-cyan);
    }
    .legend-swatch.swatch-green {
      background: var(--accent-green-bg);
      border-color: var(--accent-green);
    }

    /* Timestamp subscript */
    .ts {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: var(--font-weight-medium);
      display: block;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Operations Sorted by Timestamp</h2>
      <p class="card-subtitle">Mixed operations from A and B are ordered by timestamp to produce a single deterministic stream</p>

      <div class="card-body">

        <!-- Legend -->
        <div class="legend">
          <div class="legend-item">
            <div class="legend-swatch swatch-cyan"></div>
            Reactor A ops
          </div>
          <div class="legend-item">
            <div class="legend-swatch swatch-green"></div>
            Reactor B ops
          </div>
        </div>

        <!-- Unsorted stream (as received) -->
        <div class="stream-label">As received</div>
        <div class="op-row">
          <div class="box box-sm accent-cyan">A₁ <span class="ts">t=1</span></div>
          <div class="box box-sm accent-green">B₂ <span class="ts">t=4</span></div>
          <div class="box box-sm accent-cyan">A₃ <span class="ts">t=5</span></div>
          <div class="box box-sm accent-green">B₁ <span class="ts">t=2</span></div>
          <div class="box box-sm accent-cyan">A₂ <span class="ts">t=3</span></div>
          <div class="box box-sm accent-green">B₃ <span class="ts">t=6</span></div>
        </div>

        <!-- Arrow: sort by timestamp -->
        <div class="v-arrow">
          <div class="v-arrow-line"></div>
          <div class="v-arrow-label">Sort by timestamp</div>
        </div>

        <!-- Sorted stream -->
        <div class="stream-label">Sorted by timestamp</div>
        <div class="op-row">
          <div class="box box-sm accent-cyan">A₁ <span class="ts">t=1</span></div>
          <div class="box box-sm accent-green">B₁ <span class="ts">t=2</span></div>
          <div class="box box-sm accent-cyan">A₂ <span class="ts">t=3</span></div>
          <div class="box box-sm accent-green">B₂ <span class="ts">t=4</span></div>
          <div class="box box-sm accent-cyan">A₃ <span class="ts">t=5</span></div>
          <div class="box box-sm accent-green">B₃ <span class="ts">t=6</span></div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
