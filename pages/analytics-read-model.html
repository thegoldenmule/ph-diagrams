<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame { max-width: 700px; }
    .card  { height: auto; }
    .card-body { flex: none; }

    /* Shared box style */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 15px;
      font-weight: var(--font-weight-semibold);
      text-align: center;
    }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }
    .box.accent-green  { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }
    .box.accent-purple { border-color: var(--accent-purple); background: var(--accent-purple-bg); color: var(--accent-purple); }

    /* Compact event pill */
    .event-pill {
      font-size: 13px;
      padding: var(--space-sm) var(--space-md);
      white-space: nowrap;
    }

    /* ── Main diagram grid ── */
    .diagram {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      column-gap: 0;
      row-gap: 0;
    }

    /* Event stream entering from left */
    .events-group {
      grid-column: 1;
      grid-row: 1;
      align-self: center;
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    /* Event stream exiting to right */
    .events-group-right {
      grid-column: 3;
      grid-row: 1;
      align-self: center;
      justify-self: start;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* Tall function box in the middle */
    .fn-box {
      grid-column: 2;
      grid-row: 1;
      min-height: 90px;
      padding: var(--space-xl) var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fn-label {
      font-family: var(--font-mono, 'SF Mono', 'Fira Code', monospace);
      font-size: 15px;
    }

    /* Vertical arrow section below function */
    .v-section {
      grid-column: 2;
      grid-row: 2;
      justify-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-sm) 0;
    }

    /* Result section below arrow */
    .result-section {
      grid-column: 1 / -1;
      grid-row: 3;
      display: flex;
      justify-content: center;
    }

    /* ── Horizontal connector arrow ── */
    .h-conn {
      width: 14px;
      height: 2px;
      background: var(--text-primary);
      position: relative;
      flex-shrink: 0;
    }
    .h-conn.arrow::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid var(--text-primary);
    }

    /* ── Vertical connector arrow ── */
    .v-conn {
      width: 2px;
      height: 20px;
      background: var(--text-primary);
      position: relative;
    }
    .v-conn.arrow::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 7px solid var(--text-primary);
    }

    /* Stream continuation dots */
    .stream-dots {
      color: var(--text-muted);
      font-size: 20px;
      letter-spacing: 3px;
      line-height: 1;
    }

    /* ── Result chart box ── */
    .result-box {
      border-radius: var(--radius-md);
      overflow: hidden;
      min-width: 420px;
    }
    .db-label {
      font-family: var(--font-mono, 'SF Mono', 'Fira Code', monospace);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .db-icon {
      font-size: 13px;
    }
    .chart-area {
      padding: var(--space-lg) var(--space-md) var(--space-md);
    }
    .chart-area svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .chart-axis-label {
      font-family: var(--font-mono, 'SF Mono', 'Fira Code', monospace);
      font-size: 9px;
      fill: var(--text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Analytics Read Model</h2>
      <p class="card-subtitle">Collecting change analytics into a time-series database</p>

      <div class="card-body">
        <div class="diagram">

          <!-- Left: operation entering -->
          <div class="events-group">
            <div class="box accent-green event-pill">SET_NAME</div>
            <div class="h-conn arrow"></div>
          </div>

          <!-- Center: function box -->
          <div class="box accent-blue fn-box">
            <span class="fn-label">AnalyticsView</span>
          </div>

          <!-- Right: operations after + continuation -->
          <div class="events-group-right">
            <div class="h-conn arrow"></div>
            <div class="box accent-green event-pill">ADD_MODULE</div>
            <div class="h-conn arrow"></div>
            <div class="box accent-green event-pill">ADD_OPERATION</div>
            <div class="h-conn arrow"></div>
            <span class="stream-dots">···</span>
          </div>

          <!-- Arrow down from function -->
          <div class="v-section">
            <div class="v-conn arrow"></div>
          </div>

          <!-- Projected result table (time-series style) -->
          <div class="result-section">
            <div class="box accent-purple result-box">
              <div class="db-label">
                <span class="db-icon">&#9719;</span>
                document_events
              </div>
              <div class="chart-area">
                <svg viewBox="0 0 380 120" xmlns="http://www.w3.org/2000/svg">
                  <!-- Grid lines -->
                  <line x1="30" y1="10" x2="370" y2="10" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                  <line x1="30" y1="35" x2="370" y2="35" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                  <line x1="30" y1="60" x2="370" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                  <line x1="30" y1="85" x2="370" y2="85" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
                  <!-- X axis -->
                  <line x1="30" y1="100" x2="370" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
                  <!-- Y axis -->
                  <line x1="30" y1="10" x2="30" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

                  <!-- Y axis labels -->
                  <text x="24" y="13" class="chart-axis-label" text-anchor="end">40</text>
                  <text x="24" y="38" class="chart-axis-label" text-anchor="end">30</text>
                  <text x="24" y="63" class="chart-axis-label" text-anchor="end">20</text>
                  <text x="24" y="88" class="chart-axis-label" text-anchor="end">10</text>

                  <!-- X axis labels -->
                  <text x="55"  y="112" class="chart-axis-label" text-anchor="middle">Jan</text>
                  <text x="123" y="112" class="chart-axis-label" text-anchor="middle">Feb</text>
                  <text x="191" y="112" class="chart-axis-label" text-anchor="middle">Mar</text>
                  <text x="259" y="112" class="chart-axis-label" text-anchor="middle">Apr</text>
                  <text x="327" y="112" class="chart-axis-label" text-anchor="middle">May</text>

                  <!-- Line fill gradient -->
                  <defs>
                    <linearGradient id="line-fill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="var(--accent-purple)" stop-opacity="0.25"/>
                      <stop offset="100%" stop-color="var(--accent-purple)" stop-opacity="0"/>
                    </linearGradient>
                  </defs>

                  <!-- Area under line -->
                  <path d="M55,75 L123,55 L191,62 L259,30 L327,18 L327,100 L55,100 Z" fill="url(#line-fill)"/>

                  <!-- Line -->
                  <polyline
                    points="55,75 123,55 191,62 259,30 327,18"
                    fill="none"
                    stroke="var(--accent-purple)"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />

                  <!-- Data points -->
                  <circle cx="55"  cy="75" r="3" fill="var(--accent-purple)"/>
                  <circle cx="123" cy="55" r="3" fill="var(--accent-purple)"/>
                  <circle cx="191" cy="62" r="3" fill="var(--accent-purple)"/>
                  <circle cx="259" cy="30" r="3" fill="var(--accent-purple)"/>
                  <circle cx="327" cy="18" r="3" fill="var(--accent-purple)"/>
                </svg>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
