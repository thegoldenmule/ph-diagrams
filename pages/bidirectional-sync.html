<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 700px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      text-align: center;
    }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }
    .box.accent-new {
      border: 2px dashed var(--accent-cyan);
      background: var(--accent-cyan-bg);
      color: var(--accent-cyan);
    }

    .box-title {
      font-size: 14px;
      font-weight: var(--font-weight-semibold);
    }
    .box-sm {
      padding: var(--space-sm) var(--space-md);
      font-size: 12px;
      font-weight: var(--font-weight-semibold);
    }

    .reactor-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--space-lg);
      align-items: start;
    }

    .reactor-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }

    .sync-arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      align-self: center;
      padding-top: 0;
    }

    .sync-arrow-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
    }

    .sync-arrow-line-left {
      width: 60px;
      height: 2px;
      background: var(--accent-cyan);
      position: relative;
    }
    .sync-arrow-line-left::before {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 7px solid var(--accent-cyan);
    }

    .sync-arrow-line-right {
      width: 60px;
      height: 2px;
      background: var(--accent-green);
      position: relative;
    }
    .sync-arrow-line-right::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid var(--accent-green);
    }

    .sync-arrow-label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
    }
    .sync-arrow-label.label-cyan  { color: var(--accent-cyan); }
    .sync-arrow-label.label-green { color: var(--accent-green); }

    .v-connector {
      width: 2px;
      height: 20px;
      background: var(--text-muted);
      margin: 0 auto;
      position: relative;
      opacity: 0.4;
    }
    .v-connector::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: -4px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid var(--text-muted);
    }

    .result-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--space-md);
      align-items: center;
    }

    .gc-stream {
      border: 1px dashed rgba(0, 209, 209, 0.3);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .stream-label {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .op-row {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .op-row .box-sm {
      flex: 0 0 auto;
      min-width: 36px;
      padding: var(--space-sm) 6px;
      font-size: 11px;
    }

    .equals-indicator {
      font-size: 28px;
      font-weight: var(--font-weight-bold);
      color: var(--accent-cyan);
      text-align: center;
      line-height: 1;
    }

    .convergence-label {
      font-size: 12px;
      font-weight: var(--font-weight-semibold);
      color: var(--accent-cyan);
      text-align: center;
      margin-top: var(--space-md);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Bidirectional Sync</h2>
      <p class="card-subtitle">Both reactors exchange reshuffled operations and garbage collect, converging on identical streams</p>

      <div class="card-body">

        <div class="reactor-row">

          <div class="reactor-col">
            <div class="box accent-blue" style="width:100%">
              <div class="box-title">Reactor A</div>
            </div>
          </div>

          <div class="sync-arrows">
            <div class="sync-arrow-wrapper">
              <div class="sync-arrow-label label-cyan">reshuffled ops</div>
              <div class="sync-arrow-line-left"></div>
            </div>
            <div class="sync-arrow-wrapper">
              <div class="sync-arrow-line-right"></div>
              <div class="sync-arrow-label label-green">reshuffled ops</div>
            </div>
          </div>

          <div class="reactor-col">
            <div class="box accent-blue" style="width:100%">
              <div class="box-title">Reactor B</div>
            </div>
          </div>

        </div>

        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: var(--space-md); margin-top: var(--space-md);">
          <div class="v-connector" style="margin: 0 auto;"></div>
          <div></div>
          <div class="v-connector" style="margin: 0 auto;"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: var(--space-md); margin-top: var(--space-md);">
          <div class="stream-label">garbage collect</div>
          <div></div>
          <div class="stream-label">garbage collect</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: var(--space-md); margin-top: var(--space-sm);">
          <div class="v-connector" style="margin: 0 auto;"></div>
          <div></div>
          <div class="v-connector" style="margin: 0 auto;"></div>
        </div>

        <div class="result-row" style="margin-top: var(--space-md);">

          <div class="gc-stream">
            <div class="stream-label">A&prime;</div>
            <div class="op-row">
              <div class="box box-sm accent-new">A₁′</div>
              <div class="box box-sm accent-new">B₁′</div>
              <div class="box box-sm accent-new">A₂′</div>
              <div class="box box-sm accent-new">B₂′</div>
              <div class="box box-sm accent-new">A₃′</div>
              <div class="box box-sm accent-new">B₃′</div>
            </div>
          </div>

          <div class="equals-indicator">=</div>

          <div class="gc-stream">
            <div class="stream-label">B&prime;</div>
            <div class="op-row">
              <div class="box box-sm accent-new">A₁′</div>
              <div class="box box-sm accent-new">B₁′</div>
              <div class="box box-sm accent-new">A₂′</div>
              <div class="box box-sm accent-new">B₂′</div>
              <div class="box box-sm accent-new">A₃′</div>
              <div class="box box-sm accent-new">B₃′</div>
            </div>
          </div>

        </div>

        <div class="convergence-label">A&prime; = B&prime; &mdash; identical streams</div>

      </div>
    </div>
  </div>
</body>
</html>
