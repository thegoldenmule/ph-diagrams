<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 700px;
    }
    .card {
      height: auto;
      width: auto;
    }
    .card-body {
      gap: var(--space-md);
      flex: none;
    }

    /* Two-column grid with center bridge */
    .diagram-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0 var(--space-lg);
      align-items: start;
    }

    /* Column headers */
    .col-header {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-bottom: var(--space-xs);
      text-align: center;
    }
    .col-header.spec { color: var(--accent-cyan); }
    .col-header.codegen { color: var(--accent-purple); }
    .col-header.reducer { color: var(--accent-blue); }

    /* Vertical column flow */
    .col-spec,
    .col-reducer {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
    }

    /* Center bridge column */
    .col-bridge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      padding-top: 40px;
    }

    /* Box component used in columns */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      text-align: center;
    }
    .box.accent-cyan  { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-purple { border-color: var(--accent-purple); background: var(--accent-purple-bg); color: var(--accent-purple); }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }
    .box.accent-green  { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }

    .box-title {
      font-size: 14px;
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--space-xs);
    }

    .box-detail {
      font-size: 12px;
      opacity: 0.75;
      line-height: var(--line-height-normal);
    }

    /* Vertical connector between boxes */
    .v-connector {
      width: 3px;
      height: 20px;
      background: var(--text-primary);
      margin: var(--space-sm) auto var(--space-md) auto;
      position: relative;
    }
    .v-connector-label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      white-space: nowrap;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .v-connector::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid var(--text-primary);
    }

    /* Horizontal codegen arrow */
    .h-arrow {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      white-space: nowrap;
    }
    .h-arrow-line {
      height: 3px;
      width: 16px;
      background: var(--accent-purple);
      position: relative;
    }
    .h-arrow-line.has-head::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--accent-purple);
    }
    .h-arrow-label {
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--accent-purple);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .h-arrow-sublabel {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: none;
      letter-spacing: normal;
    }

    /* PHDocument wrapper — dotted border around State + Operations */
    .phdocument-wrapper {
      border: 1px dashed var(--accent-green);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      position: relative;
    }
    .phdocument-wrapper-label {
      position: absolute;
      top: -9px;
      left: var(--space-md);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--accent-green);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--bg-surface);
      padding: 0 var(--space-sm);
    }

    .output-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Document-Model Architecture</h2>
      <p class="card-subtitle">From spec to immutable document state</p>

      <div class="card-body">
        <div class="diagram-grid">

          <!-- Column Headers -->
          <div class="col-header spec">Specification</div>
          <div class="col-header codegen"></div>
          <div class="col-header reducer">Reducer</div>

          <!-- Left Column: Spec -->
          <div class="col-spec">
            <div class="box accent-cyan">
              <div class="box-title">State Schema</div>
              <div class="box-detail"></div>
            </div>
            <div class="v-connector"></div>
            <div class="box accent-cyan">
              <div class="box-title">Action Schema</div>
              <div class="box-detail">
                
              </div>
            </div>
            <div class="v-connector"></div>
            <div class="box accent-cyan">
              <div class="box-title">Versions</div>
              <div class="box-detail">Migrations</div>
            </div>
          </div>

          <!-- Center Bridge -->
          <div class="col-bridge">
            <div class="h-arrow">
              <div class="h-arrow-line"></div>
              <div>
                <div class="h-arrow-label">Codegen</div>
                <div class="h-arrow-sublabel">TS Types</div>
              </div>
              <div class="h-arrow-line has-head"></div>
            </div>
          </div>

          <!-- Right Column: Reducer -->
          <div class="col-reducer">
            <div class="box accent-blue">
              <div class="box-title">Action</div>
              <div class="box-detail">{ type, input }</div>
            </div>
            <div class="v-connector"></div>
            <div class="box accent-blue" style="padding: var(--space-lg);">
              <div class="box-title">Reducer</div>
              <div class="box-detail">
                f(state, action) &rarr; (state', operation[])
              </div>
            </div>
            <div class="v-connector"></div>
            <div class="phdocument-wrapper">
              <span class="phdocument-wrapper-label">PHDocument</span>
              <div class="output-group">
                <div class="box accent-green">
                  <div class="box-title">State</div>
                </div>
                <div class="box accent-green">
                  <div class="box-title">Operations</div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
