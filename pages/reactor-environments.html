<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 800px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    /* Box styles */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 13px;
      font-weight: var(--font-weight-medium);
      text-align: center;
    }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-green  { border-color: var(--accent-green);  background: var(--accent-green-bg);  color: var(--accent-green); }
    .box.accent-purple { border-color: var(--accent-purple); background: var(--accent-purple-bg); color: var(--accent-purple); }

    .box-title {
      font-size: 14px;
      font-weight: var(--font-weight-semibold);
    }

    /* Runtime/platform chip beneath or above Reactor */
    .runtime {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-sm);
      padding: var(--space-xs) var(--space-md);
      font-size: 11px;
      font-weight: var(--font-weight-medium);
      color: var(--text-secondary);
      text-align: center;
    }
    /* Environment node — dashed container */
    .env {
      border: 1px dashed var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      padding-top: calc(var(--space-md) + 4px);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .env-label {
      position: absolute;
      top: -9px;
      left: var(--space-md);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--bg-surface);
      padding: 0 var(--space-sm);
    }

    /* 3-column grid */
    .env-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-md);
    }

    /* Vertical stems */
    .stem-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-md);
    }
    .stem {
      width: 2px;
      height: 16px;
      background: var(--accent-cyan);
      margin: 0 auto;
      opacity: 0.4;
    }
    .stem-row .stem:nth-child(2) {
      visibility: hidden;
    }

    /* Communication bus */
    .comm-bus {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-sm) 0;
    }
    .comm-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-cyan), transparent);
      opacity: 0.5;
    }
    .comm-label {
      position: relative;
      z-index: 1;
      background: var(--bg-surface);
      border: 1px solid var(--accent-cyan);
      border-radius: var(--radius-sm);
      padding: var(--space-xs) var(--space-md);
      font-size: 11px;
      font-weight: var(--font-weight-semibold);
      color: var(--accent-cyan);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="card-body">

        <!-- Top environments -->
        <div class="env-row">
          <div class="env">
            <span class="env-label">Server</span>
            <div class="runtime">GQL</div>
            <div class="box accent-blue">
              <div class="box-title">Reactor</div>
            </div>
            <div class="runtime">Node.js</div>
          </div>
          <div class="env">
            <span class="env-label">Browser</span>
            <div class="runtime">UI Layer</div>
            <div class="box accent-blue">
              <div class="box-title">Reactor</div>
            </div>
            <div class="runtime">V8</div>
          </div>
          <div class="env">
            <span class="env-label">CLI Tool</span>
            <div class="runtime">File Parser</div>
            <div class="box accent-blue">
              <div class="box-title">Reactor</div>
            </div>
            <div class="runtime">Bun</div>
          </div>
        </div>

        <!-- Stems down -->
        <div class="stem-row">
          <div class="stem"></div>
          <div class="stem"></div>
          <div class="stem"></div>
        </div>

        <!-- Communication bus -->
        <div class="comm-bus">
          <div class="comm-line"></div>
          <span class="comm-label">Sync</span>
        </div>

        <!-- Stems down -->
        <div class="stem-row">
          <div class="stem"></div>
          <div class="stem"></div>
          <div class="stem"></div>
        </div>

        <!-- Bottom environments -->
        <div class="env-row">
          <div class="env">
            <span class="env-label">ETL Pipeline</span>
            <div class="runtime">Map / Reduce</div>
            <div class="box accent-blue">
              <div class="box-title">Reactor</div>
            </div>
            <div class="runtime">Cron</div>
          </div>
          <div class="env">
            <span class="env-label">Mobile App</span>
            <div class="runtime">Native Components</div>
            <div class="box accent-blue">
              <div class="box-title">Reactor</div>
            </div>
            <div class="runtime">JavaScriptCore</div>
          </div>
          <div class="env">
            <span class="env-label">Edge Function</span>
            <div class="runtime">HTTP</div>
            <div class="box accent-blue">
              <div class="box-title">Reactor</div>
            </div>
            <div class="runtime">Serverless</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
