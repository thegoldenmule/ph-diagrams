<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .frame {
      max-width: 900px;
    }
    .card {
      height: auto;
    }
    .card-body {
      flex: none;
    }

    /* Horizontal flow: action columns with reducer + state beneath each */
    .h-flow {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: start;
      gap: var(--space-lg);
    }

    /* Shared box style */
    .box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      font-size: 15px;
      font-weight: var(--font-weight-semibold);
      text-align: center;
    }
    .box.accent-cyan   { border-color: var(--accent-cyan);   background: var(--accent-cyan-bg);   color: var(--accent-cyan); }
    .box.accent-blue   { border-color: var(--accent-blue);   background: var(--accent-blue-bg);   color: var(--accent-blue); }
    .box.accent-purple { border-color: var(--accent-purple); background: var(--accent-purple-bg); color: var(--accent-purple); }

    /* Vertical stack: action → reducer → state */
    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Monospace state snapshot */
    .box.state-snapshot {
      font-family: var(--font-mono, 'SF Mono', 'Fira Code', 'Fira Mono', monospace);
      font-size: 12px;
      font-weight: var(--font-weight-medium);
      text-align: left;
      white-space: pre;
      line-height: 1.5;
      padding: var(--space-sm) var(--space-md);
      width: 100%;
    }

    /* Reducer pill — compact inline */
    .box.reducer {
      padding: var(--space-xs) var(--space-md);
      font-size: 12px;
      width: 100%;
    }

    /* Vertical dotted connector with downward arrow */
    .v-connector {
      width: 2px;
      height: 20px;
      border-left: 2px solid var(--text-muted);
      position: relative;
      flex-shrink: 0;
    }
    .v-connector::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: -5px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid var(--text-muted);
    }

    /* Horizontal connector arrow — aligned to action row */
    .h-connector-wrap {
      display: flex;
      align-items: center;
      margin-top: var(--space-md);
      height: calc(15px + 2 * var(--space-md));
    }
    .h-connector {
      width: 20px;
      height: 3px;
      background: var(--text-primary);
      position: relative;
      flex-shrink: 0;
    }
    .h-connector::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h2 class="card-title">Action Stream with Reducer</h2>
      <p class="card-subtitle">Document state as a fold over an ordered action stream</p>

      <div class="card-body">
        <div class="h-flow">

          <!-- Action 1: CREATE_BUDGET -->
          <div class="stack">
            <div class="box accent-purple">CREATE_BUDGET</div>
            <div class="v-connector"></div>
            <div class="box accent-blue reducer">Reducer</div>
            <div class="v-connector"></div>
            <div class="box accent-cyan state-snapshot">{ name: 'Q4' }</div>
          </div>

          <div class="h-connector-wrap">
            <div class="h-connector"></div>
          </div>

          <!-- Action 2: SET_LINEITEM -->
          <div class="stack">
            <div class="box accent-purple">SET_LINEITEM</div>
            <div class="v-connector"></div>
            <div class="box accent-blue reducer">Reducer</div>
            <div class="v-connector"></div>
            <div class="box accent-cyan state-snapshot">{ name: 'Q4',
  items: [{ id: 1 }] }</div>
          </div>

          <div class="h-connector-wrap">
            <div class="h-connector"></div>
          </div>

          <!-- Action 3: SET_AMOUNT -->
          <div class="stack">
            <div class="box accent-purple">SET_AMOUNT</div>
            <div class="v-connector"></div>
            <div class="box accent-blue reducer">Reducer</div>
            <div class="v-connector"></div>
            <div class="box accent-cyan state-snapshot">{ name: 'Q4',
  items: [{ id: 1,
    amount: 5000 }] }</div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
